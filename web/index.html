<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1410">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Boletim de Clima &amp; Colheita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===== TEMA ESCURO (verde profundo) ===== */
  [data-theme="dark"]{
    --bg:#0b1410; --panel:#12211a; --panel2:#0e1b15; --panelHover:#16291f;
    --border:#1f3a2c; --border2:#2e5240;
    --tx:#e6efe8; --mut:#9bb3a5; --dim:#6f8a7c; --vdim:#4d6457;
    --brand:#46b27a; --brandL:#7dd1a4; --chartMax:#cf9b8f; --chartMin:#8fbcae;
    --amber:#f59e0b; --amberL:#fcd34d; --sky:#38bdf8; --skyL:#7dd3fc;
    --emerald:#34d399; --emeraldL:#6ee7b7; --red:#f87171; --redL:#fca5a5;
    --violet:#a78bfa; --violetL:#c4b5fd; --cyan:#67e8f9;
    --grid:rgba(155,179,165,.12); --shadow:rgba(0,0,0,.45); --on-accent:#0b1410;
    --headGrad:linear-gradient(to bottom,rgba(34,80,55,.28),transparent);
  }
  /* ===== TEMA CLARO (verde suave, texto de alto contraste) ===== */
  [data-theme="light"]{
    --bg:#e9eee2; --panel:#ffffff; --panel2:#eef2e8; --panelHover:#f3f7ef;
    --border:#d4ddc9; --border2:#b9c7aa;
    --tx:#13201a; --mut:#39483f; --dim:#53645a; --vdim:#7c8a81;
    --brand:#2f7d54; --brandL:#236343; --chartMax:#b06b62; --chartMin:#4f897a;
    --amber:#b3690a; --amberL:#8f5208; --sky:#0b6ea8; --skyL:#075f93;
    --emerald:#0f8a5f; --emeraldL:#0a6b49; --red:#c0392b; --redL:#962d22;
    --violet:#6b4fc0; --violetL:#553aa6; --cyan:#0e7490;
    --grid:rgba(40,70,50,.08); --shadow:rgba(31,58,42,.10); --on-accent:#ffffff;
    --headGrad:linear-gradient(to bottom,rgba(47,125,84,.08),transparent);
  }
  /* ===== TEMA CLARO: elevacao dos cards de dados + destaque do menu ===== */
  [data-theme="light"] header{box-shadow:0 1px 10px rgba(31,58,42,.06)}
  [data-theme="light"] .panel,
  [data-theme="light"] .kpi,
  [data-theme="light"] .nav-card,
  [data-theme="light"] .alert{box-shadow:0 1px 2px rgba(31,58,42,.04),0 7px 20px rgba(31,58,42,.08)}
  [data-theme="light"] .muncard{box-shadow:0 1px 3px rgba(31,58,42,.07),0 4px 12px rgba(31,58,42,.05)}
  [data-theme="light"] .nav-card:hover{box-shadow:0 2px 5px rgba(31,58,42,.06),0 14px 30px rgba(31,58,42,.14);transform:translateY(-1px)}
  [data-theme="light"] .side-dist .side-item.on,
  [data-theme="light"] .side-brasil.on{background:#dcebe2;box-shadow:inset 3px 0 0 var(--brand)}
  [data-theme="light"] .side-reg.on{background:#e6f0df}
  [data-theme="light"] .side-item:hover{background:#e9f0e3}
  [data-theme="light"] .legend-item.on{background:#dcebe2;border-color:var(--brand)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
  .mono{font-family:'IBM Plex Mono',monospace}
  .serif{font-family:'Fraunces',Georgia,serif}
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px}

  header{position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border);background:var(--bg)}
  [data-theme="light"] header{background:var(--panel2)}
  .head-in{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;padding:10px 0}
  .eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:3px}
  .eyebrow .bar{width:4px;height:20px;background:var(--brand)}
  .eyebrow span{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.3em;color:var(--brand)}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:400;font-size:clamp(18px,3vw,27px);line-height:1.05}
  h1 em{font-style:italic;color:var(--brandL)}
  .head-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .head-meta{text-align:right;font-size:12px;color:var(--dim)}
  .head-meta .big{font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--brandL)}
  .theme-btn{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--border2);background:var(--panel);color:var(--mut);border-radius:20px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;transition:.15s}
  .theme-btn:hover{border-color:var(--brand);color:var(--brand)}

  /* ===== LAYOUT: MENU LATERAL + CONTEUDO ===== */
  .app{display:flex;max-width:1280px;margin:0 auto;align-items:flex-start}
  .sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border);padding:22px 14px}
  .nav-toggle{display:none}
  .side-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);margin:0 8px 12px}
  .side-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:none;color:var(--tx);font:inherit;padding:10px;border-radius:8px;cursor:pointer;transition:.12s}
  .side-item:hover{background:var(--panelHover)}
  .side-reg{font-family:'Fraunces',Georgia,serif;font-size:16px}
  .side-reg.on{background:var(--panelHover)}
  .swatch{width:12px;height:12px;border-radius:3px;flex-shrink:0}
  .side-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-left:auto}
  .side-dist{margin:2px 0 6px}
  .side-dist .side-item{padding:7px 10px 7px 34px;font-size:13px;color:var(--mut)}
  .side-dist .side-item:hover{color:var(--tx)}
  .side-dist .side-item.on{color:var(--brand);background:var(--panelHover);font-weight:500}
  .side-brasil{margin-bottom:8px;color:var(--mut)}
  .side-brasil.on{color:var(--brand);background:var(--panelHover)}
  .content{flex:1;min-width:0;padding:26px 24px 60px}
  .loading{text-align:center;color:var(--dim);padding:80px 0;font-family:'IBM Plex Mono',monospace;font-size:13px}

  .cbread{display:flex;align-items:center;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin-bottom:18px}
  .btn-print{display:inline-flex;align-items:center;gap:6px;margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--brandL);background:var(--panel2);border:1px solid var(--border2);border-radius:7px;padding:7px 12px;cursor:pointer;transition:.15s}
  .btn-print:hover{border-color:var(--brand);color:var(--brand)}
  #print-area{display:none}
  .cbread button{background:none;border:none;color:var(--mut);cursor:pointer;font:inherit;padding:0}
  .cbread button:hover{color:var(--brand)}
  .cbread .sep{color:var(--vdim);margin:0 7px}
  .cbread .cur{color:var(--brand)}

  /* ===== MAPA ===== */
  .maprow{display:flex;gap:26px;flex-wrap:wrap}
  .mapbox{flex:1 1 460px;min-width:300px}
  .maptitle{font-family:'Fraunces',Georgia,serif;font-weight:300;font-size:26px;margin-bottom:6px}
  .mapsub{font-size:13px;color:var(--mut);margin-bottom:18px}
  .map svg{width:100%;height:auto;max-height:70vh;display:block}
  .map path{stroke:var(--border2);stroke-width:1.2;cursor:pointer;transition:fill .15s,opacity .15s,stroke .15s}
  .map path:hover{stroke:var(--brand);stroke-width:1.8}
  .legend{flex:0 0 220px}
  .legend .lt{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);margin-bottom:10px}
  .legend-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--tx);font:inherit;padding:9px 10px;border-radius:8px;cursor:pointer;transition:.12s}
  .legend-item:hover{background:var(--panelHover)}
  .legend-item.on{border-color:var(--brand);background:var(--panelHover)}
  .legend-item .nm{font-size:13px}
  .legend-item .ct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-left:auto}

  .nav-card{border:1px solid var(--border);background:var(--panel);border-radius:8px;padding:24px;cursor:pointer;transition:.18s;text-align:left;font:inherit;color:inherit;box-shadow:0 1px 3px var(--shadow)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:26px}
  .resumo-kpis{margin-top:8px}
  .kpi{border:1px solid var(--border);background:var(--panel);border-radius:8px;padding:18px;position:relative;overflow:hidden;box-shadow:0 1px 3px var(--shadow)}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--brand))}
  .kpi.amber{--accent:var(--amber)} .kpi.sky{--accent:var(--sky)} .kpi.violet{--accent:var(--violet)} .kpi.cyan{--accent:var(--cyan)} .kpi.emerald{--accent:var(--emerald)} .kpi.brand{--accent:var(--brand)} .kpi.tmax{--accent:var(--chartMax)} .kpi.tmin{--accent:var(--chartMin)}
  .kpi .kicker{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .kpi .kicker .ic{color:var(--accent,var(--brand));opacity:.9}
  .kpi .lab{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.13em;color:var(--mut)}
  .kpi .val{font-family:'Fraunces',Georgia,serif;font-weight:300;font-size:32px;line-height:1;color:var(--accent,var(--brand))}
  .kpi .sub{font-size:12px;color:var(--mut);margin-top:5px}

  .alert{display:flex;gap:13px;align-items:flex-start;border:1px solid var(--border);background:var(--panel);border-left:3px solid var(--red);border-radius:8px;padding:15px 17px;margin-bottom:12px;box-shadow:0 1px 3px var(--shadow)}
  .alert .ico{color:var(--red);flex-shrink:0;margin-top:1px}
  .alert .t{font-weight:600;color:var(--redL)}
  .alert .d{color:var(--mut);font-size:13px;margin-top:2px}
  .alert.empty{border-left-color:var(--emerald)}
  .alert.empty .ico{color:var(--emerald)} .alert.empty .t{color:var(--emeraldL)}

  .panel{border:1px solid var(--border);background:var(--panel);border-radius:8px;padding:24px;margin-bottom:22px;box-shadow:0 1px 3px var(--shadow)}
  .stitle{font-family:'IBM Plex Mono',monospace;font-size:12px;text-transform:uppercase;letter-spacing:.18em;color:var(--mut);margin-bottom:18px;font-weight:500;display:flex;align-items:center;gap:9px}
  .grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(380px,1fr));gap:18px}
  .chart-scroll{overflow-x:auto;overflow-y:hidden}
  .filtro{padding:18px 22px}
  .filtro-top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .filtro-acts{display:flex;align-items:center;gap:8px}
  .filtro-acts .fcount{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
  .fbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);background:var(--panel2);border:1px solid var(--border);border-radius:14px;padding:5px 12px;cursor:pointer;transition:.12s}
  .fbtn:hover{border-color:var(--brand);color:var(--brand)}
  .chips{display:flex;flex-wrap:wrap;gap:7px;max-height:148px;overflow-y:auto}
  .chip{font-size:12px;color:var(--mut);background:var(--panel2);border:1px solid var(--border);border-radius:14px;padding:5px 11px;cursor:pointer;transition:.12s;white-space:nowrap}
  .chip:hover{border-color:var(--border2);color:var(--tx)}
  .chip.on{color:var(--on-accent);background:var(--brand);border-color:var(--brand);font-weight:500}
  .fontes{border:1px solid var(--border);background:var(--panel2);border-radius:8px;padding:12px 16px;margin-bottom:18px}
  .ftitle{display:flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  .fonte-row{display:grid;grid-template-columns:80px 1fr auto auto;gap:10px;align-items:baseline;padding:4px 0;font-size:12.5px}
  .fonte-row .fl{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim)}
  .fonte-row .ff{color:var(--tx);font-weight:500}
  .fonte-row .fe{color:var(--mut);font-size:11px}
  .fonte-row .fd{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);white-space:nowrap}
  .fonte-banner{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--mut);background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:16px}
  .colh-head,.colh-row{display:grid;grid-template-columns:2fr 1fr 1fr 1.1fr 1.1fr;gap:8px;align-items:center}
  .colh-head{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);padding:6px 0;border-bottom:1px solid var(--border)}
  .colh-row{padding:11px 0;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--tx)}
  .cr-nome{font-family:'Fraunces',Georgia,serif;font-size:16px;display:flex;flex-direction:column}
  .cr-gran{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
  .cr-colh{color:var(--brandL);font-weight:500}
  .cr-meta{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--dim);padding:2px 0 10px;border-bottom:1px solid var(--border)}
  .cpos{color:var(--emeraldL)} .cneg{color:var(--redL)} .cmut{color:var(--mut)}
  .preco-box{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;background:var(--panel2);border:1px solid var(--border2);border-radius:8px;padding:10px 16px;margin-bottom:14px}
  .preco-lab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mut)}
  .preco-v{font-family:'Fraunces',Georgia,serif;font-size:24px;font-weight:500;color:var(--brandL)}
  .preco-u{font-size:12px;color:var(--mut)}
  .preco-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-left:auto}
  .ria{border-left:3px solid var(--brand);margin-bottom:16px}
  .ria-tag{margin-left:8px;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);border:1px solid var(--border);border-radius:4px;padding:2px 6px;vertical-align:middle}
  .ria-txt{font-size:14.5px;line-height:1.7;color:var(--tx);margin:4px 0 12px}
  .ria-pts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
  .ria-pt{display:flex;gap:9px;align-items:flex-start;font-size:13px;line-height:1.55;color:var(--mut)}
  .ria-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--brand);margin-top:7px}
  .ria-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--vdim)}
  .preco-stale{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--amberL);border:1px solid var(--amber);border-radius:4px;padding:1px 6px}
  .mun-colh{margin-top:12px;padding-top:12px;border-top:1px dashed var(--border)}
  .mc-h{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
  .mc-deriv{margin-left:6px;font-size:9px;letter-spacing:.06em;color:var(--dim);border:1px solid var(--border);border-radius:4px;padding:1px 5px;text-transform:uppercase}
  .mc-fonte{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:8px}

  .muncard{border:1px solid var(--border);background:var(--panel);border-radius:10px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 3px var(--shadow);transition:.18s}
  .muncard:hover{box-shadow:0 6px 22px var(--shadow)}
  .muncard.semdado{opacity:.65}
  .muncard-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 22px;background:linear-gradient(to right,rgba(70,178,122,.07),transparent);border-bottom:1px solid var(--border)}
  .muncard-id .nm{font-family:'Fraunces',Georgia,serif;font-size:21px;color:var(--tx)}
  .muncard-id .co{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:2px}
  .badge-old{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);border:1px solid var(--border2);border-radius:10px;padding:2px 8px;margin-left:8px;vertical-align:middle}
  .muncard-now{display:flex;align-items:center;gap:18px}
  .muncard-temp{display:flex;align-items:center;gap:12px}
  .muncard-temp .big{font-family:'Fraunces',Georgia,serif;font-weight:300;font-size:40px;line-height:1;color:var(--amberL)}
  .muncard-temp .mm{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--mut);text-align:left}
  .muncard-temp .mm .mx{color:var(--amber)} .muncard-temp .mm .mn{color:var(--violet)}
  .muncard-body{padding:18px 22px;display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:14px}
  .metric{text-align:center;padding:10px;background:var(--panel2);border-radius:7px}
  .metric .mv{font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--tx)}
  .metric .ml{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);margin-top:3px}
  .metric .mv.sky{color:var(--skyL)} .metric .mv.cyan{color:var(--cyan)} .metric .mv.brand{color:var(--brandL)}

  .week{display:flex;gap:8px;padding:18px 22px;border-top:1px solid var(--border);overflow-x:auto}
  .wday{flex:1;min-width:84px;text-align:center;padding:14px 8px;background:var(--panel2);border-radius:8px;border:1px solid transparent;transition:.15s}
  .wday.today{border-color:var(--brand);background:linear-gradient(to bottom,rgba(70,178,122,.10),var(--panel2))}
  .wday .wd{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--dim);letter-spacing:.05em}
  .wday .wi{margin:10px auto;width:34px;height:34px}
  .wday .wmax{font-family:'Fraunces',Georgia,serif;font-size:20px;color:var(--tx)}
  .wday .wmin{font-size:11px;color:var(--dim)}
  .wday .wr{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--skyL);margin-top:6px}

  .soon{border:1px dashed var(--border2);border-radius:10px;padding:32px;text-align:center;color:var(--dim)}
  .soon .tag{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--brandL);border:1px solid var(--brand);background:rgba(70,178,122,.10);border-radius:20px;padding:4px 12px;margin-bottom:14px}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
  .tab{display:flex;align-items:center;gap:8px;padding:13px 18px;font-size:14px;font-weight:500;color:var(--mut);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;transition:.15s}
  .tab:hover{color:var(--tx)}
  .tab.on{color:var(--brand);border-bottom-color:var(--brand)}
  .tab .ic{display:inline-flex}

  footer{border-top:1px solid var(--border);background:var(--panel2);padding:24px 0;margin-top:0}
  .foot{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--vdim);text-align:center}
  .src{font-size:12px;color:var(--mut);text-align:center;margin-bottom:10px;line-height:1.6}

  @media(max-width:900px){
    .app{flex-direction:column}
    .nav-toggle{display:flex;align-items:center;gap:10px;width:100%;padding:14px 16px;background:var(--panel2);border:none;border-bottom:1px solid var(--border);color:var(--tx);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
    .sidebar{display:none;width:auto;border-right:none;border-bottom:1px solid var(--border)}
    .sidebar.aberta{display:block}
    .content{padding:22px 20px 50px}
  }
  @page{margin:13mm}
  @media print{
    body > header, body > .app, body > footer{display:none !important}
    body{background:#ffffff}

// ===== TEMA =====
var tema = "dark";
function aplicaTema(t){
  tema = t;
  document.documentElement.setAttribute("data-theme", t);
  var ico = document.getElementById("themeIco"), txt = document.getElementById("themeTxt");
  if(t === "dark"){ ico.innerHTML = iconeLua(16,"#7dd1a4"); txt.textContent = "Tema escuro"; }
  else { ico.innerHTML = iconeSol(16,"#2f7d54"); txt.textContent = "Tema claro"; }
  try{ localStorage.setItem("tema_obs", t); }catch(e){}
  if(nav.distrito && tabAtiva==="clima" && cacheDistrito[nav.distrito]){
    setTimeout(function(){ desenhaGraficos(cacheDistrito[nav.distrito]); }, 30);
  }
}
function toggleTema(){ aplicaTema(tema === "dark" ? "light" : "dark"); }

function svgWrap(inner, size){ return '<svg viewBox="0 0 48 48" width="'+size+'" height="'+size+'" fill="none" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>'; }
function iconeSol(size, cor){
  cor = cor || "#f59e0b";
  var r='<circle cx="24" cy="24" r="9" fill="'+cor+'"/>';
  for(var i=0;i<8;i++){ var a=i*Math.PI/4,x1=24+Math.cos(a)*14,y1=24+Math.sin(a)*14,x2=24+Math.cos(a)*19,y2=24+Math.sin(a)*19;
    r+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="'+cor+'" stroke-width="2.5" stroke-linecap="round"/>'; }
  return svgWrap(r,size);
}

// ===== HELPERS =====
function $(id){ return document.getElementById(id); }
function fmtData(iso){ try{ return new Date(iso).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}); }catch(e){ return iso||"-"; } }
function diaSemana(iso){ try{ return new Date(iso+"T12:00").toLocaleDateString("pt-BR",{weekday:"short"}).replace(".","").toUpperCase(); }catch(e){ return ""; } }
function ddmm(iso){ return iso?iso.slice(8,10)+"/"+iso.slice(5,7):""; }
function hoje(){ return new Date().toISOString().slice(0,10); }
function rnd(v){ return Math.round(v==null?0:v); }
function escX(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function carregaJSON(url){ return fetch(url,{cache:"no-store"}).then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }); }
function slugReg(nome){
  var s=String(nome).toUpperCase();
  s=s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  return s.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");
}
function regNomePorId(id){ var rs=(INDEX&&INDEX.regionais)||[]; for(var i=0;i<rs.length;i++){ if(slugReg(rs[i].nome)===id) return rs[i].nome; } return null; }
function regPorNome(nome){ var rs=(INDEX&&INDEX.regionais)||[]; for(var i=0;i<rs.length;i++){ if(rs[i].nome===nome) return rs[i]; } return null; }

// ===== MENU LATERAL =====
function renderSidebar(){
  var sb=$("sidebar"); if(!sb) return;
  var rs=(INDEX&&INDEX.regionais)||[];
  var h='<div class="side-title">Navega&ccedil;&atilde;o</div>';
  h+='<button class="side-item side-brasil'+(!nav.regional?" on":"")+'" onclick="voltarBrasil()">'+icoMapa(15,"currentColor")+'<span>Brasil - vis&atilde;o geral</span></button>';
  h+='<div class="side-title" style="margin-top:14px">Regionais</div>';
  for(var i=0;i<rs.length;i++){
    var r=rs[i], id=slugReg(r.nome), nm=0;
    for(var j=0;j<r.distritos.length;j++) nm+=(r.distritos[j].n_municipios||0);
    var aberta=(nav.regional===r.nome);
    h+='<button class="side-item side-reg'+(aberta?" on":"")+'" onclick="selRegional(\''+r.nome.replace(/'/g,"\\'")+'\')">'
      +'<span class="swatch" style="background:'+(REG_CORES[id]||"#888")+'"></span><span>'+escX(r.nome)+'</span>'
      +'<span class="side-sub">'+r.distritos.length+'d</span></button>';
    if(aberta){
      h+='<div class="side-dist">';
      var ds=r.distritos.slice().sort(function(a,b){ return a.nome<b.nome?-1:1; });
      for(var k=0;k<ds.length;k++){
        var d=ds[k];
        h+='<button class="side-item'+(nav.distrito===d.id?" on":"")+'" onclick="selDistrito(\''+d.id+'\')">'
          +'<span>'+escX(d.nome)+'</span><span class="side-sub">'+(d.uf||"")+' - '+d.n_municipios+'</span></button>';
      }
      h+='</div>';
    }
  }
  sb.innerHTML=h;
}
var cacheResumo={};
function htmlResumo(r){
  if(!r||!r.texto) return "";
  var h='<div class="panel ria"><div class="stitle">'+icoBroto(14,"currentColor")+' Resumo do analista <span class="ria-tag">gerado por IA</span></div>';
  h+='<p class="ria-txt">'+escX(r.texto)+'</p>';
  if(r.pontos&&r.pontos.length){
    h+='<div class="ria-pts">';
    for(var i=0;i<r.pontos.length;i++){ h+='<div class="ria-pt"><span class="ria-dot"></span><span>'+escX(r.pontos[i])+'</span></div>'; }
    h+='</div>';
  }
  h+='<div class="ria-meta">'+escX(r.modelo||"Claude")+' &middot; '+fmtData(r.gerado_em||"")+' &middot; a partir dos dados do boletim (clima, colheita, pre&ccedil;o)</div></div>';
  return h;
}
function carregaResumoIA(id){
  var el=document.getElementById("resumo-ia"); if(!el) return;
  if(cacheResumo[id]){ el.innerHTML=htmlResumo(cacheResumo[id]); return; }
  carregaJSON(BASE+"/"+id+"/resumo.json?t="+Date.now()).then(function(r){
    cacheResumo[id]=r;
    var e2=document.getElementById("resumo-ia");
    if(e2&&nav.distrito===id) e2.innerHTML=htmlResumo(r);
  }).catch(function(e){});
}
function toggleNav(){ var s=document.getElementById("sidebar"); if(s) s.classList.toggle("aberta"); }
function fecharNav(){ var s=document.getElementById("sidebar"); if(s) s.classList.remove("aberta"); }
function rotuloNav(){ var el=document.getElementById("navToggleLabel"); if(!el) return; el.textContent = nav.distrito ? "Trocar distrito ou regi\u00e3o" : (nav.regional ? nav.regional : "Navegar"); }
function voltarBrasil(){ nav={regional:null,distrito:null}; render(); fecharNav(); rotuloNav(); window.scrollTo(0,0); }
function selRegional(nome){ if(nav.regional===nome && !nav.distrito){ nav={regional:null,distrito:null}; } else { nav={regional:nome,distrito:null}; } render(); rotuloNav(); }
function selDistrito(id){ nav.distrito=id; tabAtiva="clima"; render(); fecharNav(); rotuloNav(); window.scrollTo(0,0); }
function selEstado(uf){ var nomeId=BR.dominante[uf]; var nome=regNomePorId(nomeId); if(nome){ nav={regional:nome,distrito:null}; render(); } }

// ===== RESUMO (area + colheita) PARA HOME E REGIONAL =====
function fmtArea(ha){
  if(ha==null||ha==="") return "-";
  if(ha>=1000000) return (ha/1000000).toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})+" mi ha";
  if(ha>=1000) return Math.round(ha/1000).toLocaleString("pt-BR")+" mil ha";
  return Number(ha).toLocaleString("pt-BR")+" ha";
}
function resumoCards(){
  var R=INDEX&&INDEX.resumo; if(!R) return "";
  var sc=nav.regional?(R.por_regional&&R.por_regional[nav.regional]):R.nacional;
  if(!sc) return "";
  var pp=sc.pct_plantado, pc=sc.pct_colhido;
  var saf=(R.safra?("safra "+escX(R.safra)+" &middot; "):"");
  var h='<div class="kpis resumo-kpis">';
  h+=kpi("brand",icoMapa(18,"currentColor"),"&Aacute;rea de soja",fmtArea(sc.area_soja_ha),(nav.regional?"nesta regional":"total monitorado"));
  h+=kpi("sky",icoBroto(18,"currentColor"),"Plantado",(pp!=null?pp+"%":"-"),(pp!=null?saf+"ponderado por &aacute;rea":"sem dado de colheita"));
  h+=kpi("emerald",icoBroto(18,"currentColor"),"Colhido",(pc!=null?pc+"%":"-"),(pc!=null?saf+"ponderado por &aacute;rea":"sem dado de colheita"));
  h+='</div>';
  return h;
}

// ===== MAPA DO BRASIL =====
function viewMapa(){
  var regId = nav.regional ? slugReg(nav.regional) : null;
  var ufsRegional = regId ? (BR.regUFs[regId]||[]) : null;
  var svg='<svg viewBox="'+BR.viewBox+'" xmlns="http://www.w3.org/2000/svg">';
  for(var uf in BR.paths){
    var domId=BR.dominante[uf]||"";
    var corBase=REG_CORES[domId]||"#6b7280";
    var fill=corBase, op="0.92";
    if(regId){
      if(ufsRegional.indexOf(uf)>=0){ fill=REG_CORES[regId]; op="1"; }
      else { op="0.18"; }
    }
    var titulo=uf+(domId?(" - "+(regNomePorId(domId)||"")):"");
    svg+='<path d="'+BR.paths[uf]+'" fill="'+fill+'" fill-opacity="'+op+'" onclick="selEstado(\''+uf+'\')"><title>'+escX(titulo)+'</title></path>';
  }
  svg+='</svg>';

  var rs=(INDEX&&INDEX.regionais)||[];
  var leg='<div class="lt">Regionais</div>';
  for(var i=0;i<rs.length;i++){
    var r=rs[i], id=slugReg(r.nome);
    leg+='<button class="legend-item'+(nav.regional===r.nome?" on":"")+'" onclick="selRegional(\''+r.nome.replace(/'/g,"\\'")+'\')">'
      +'<span class="swatch" style="background:'+(REG_CORES[id]||"#888")+'"></span>'
      +'<span class="nm">'+escX(r.nome)+'</span><span class="ct">'+r.distritos.length+' dist.</span></button>';
  }

  var titulo = nav.regional ? escX(nav.regional) : "Vis&atilde;o geral do Brasil";
  var sub = nav.regional
    ? "Estados com munic&iacute;pios desta regional em destaque. Selecione um distrito no menu &agrave; esquerda."
    : "Cada estado pintado pela regional predominante. Clique numa regional (mapa ou menu) para abrir os distritos.";
  return '<div class="maptitle serif">'+titulo+'</div><div class="mapsub">'+sub+'</div>'+resumoCards()
    +'<div class="maprow"><div class="mapbox"><div class="map">'+svg+'</div></div>'
    +'<div class="legend">'+leg+'</div></div>';
}

// ===== ACESSO AO CLIMA (schema novo) =====
function climaAtual(m){ return (m.clima && m.clima.atual) || {}; }
function semana(m){ return (m.clima && m.clima.previsao_7d) || []; }
function somaChuva7(m){ var f=semana(m),s=0; for(var k=0;k<f.length;k++) s+=(f[k].precip_mm||0); return s; }
function rotuloTempo(t){ var M={sol:"Sol",parcial:"Sol e nuvens",nuvem:"Nublado",neblina:"Neblina",garoa:"Garoa",chuva:"Chuva",trovoada:"Trovoada",neve:"Neve"}; return M[t]||"-"; }
function iconePorTempo(t,s){
  if(t==="sol") return iconeSol(s);
  if(t==="parcial") return iconeSolNuvem(s);
  if(t==="garoa") return iconeGaroa(s);
  if(t==="chuva"||t==="trovoada") return iconeChuva(s);
  return iconeNuvem(s);
}
function agrega(d){
  var ms=d.municipios||[],tmaxMax=-99,tminMin=99,chuva7=0,n=0;
  for(var i=0;i<ms.length;i++){
    if(!ms[i].clima) continue;
    var a=climaAtual(ms[i]); if(a.tmax!=null&&a.tmax>tmaxMax)tmaxMax=a.tmax; if(a.tmin!=null&&a.tmin<tminMin)tminMin=a.tmin;
    chuva7+=somaChuva7(ms[i]); n++;
  }
  if(n===0){ tmaxMax=0; tminMin=0; }
  return {tmaxMax:rnd(tmaxMax),tminMin:rnd(tminMin),chuva7:(chuva7/(n||1)).toFixed(0),n:n};
}

// ===== DISTRITO (abas) =====
function viewDistrito(){
  var id=nav.distrito;
  if(cacheDistrito[id]) return Promise.resolve(montaDistrito(cacheDistrito[id]));
  return carregaJSON(BASE+"/"+id+"/latest.json?t="+Date.now()).then(function(d){ cacheDistrito[id]=d; return montaDistrito(d); })
    .catch(function(e){ return '<div class="loading">N&atilde;o foi poss&iacute;vel carregar este distrito.<br><span style="color:var(--vdim)">'+e.message+'</span></div>'; });
}
function breadDistrito(d){
  return '<div class="cbread"><button onclick="voltarBrasil()">Brasil</button><span class="sep">&rsaquo;</span>'
    +'<button onclick="selRegional(\''+(d.distrito.regional||"").replace(/'/g,"\\'")+'\')">'+escX(d.distrito.regional||"")+'</button>'
    +'<span class="sep">&rsaquo;</span><span class="cur">'+escX(d.distrito.nome||"")+'</span>'
    +'<button class="btn-print" onclick="imprimirBoletim()" title="Gerar PDF do boletim">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'
    +'<span>Imprimir / PDF</span></button></div>';
}
function montaDistrito(d){
  if(d.gerado_em) $("upd").textContent=fmtData(d.gerado_em);
  var tabs=[["clima",icoTermo(15,"currentColor"),"Clima e Previs&atilde;o"],["colheita",icoBroto(15,"currentColor"),"Colheita"],["municipios",icoMapa(15,"currentColor"),"Munic&iacute;pios"]];
  var h=breadDistrito(d)+precoDistrito(d)+'<div id="resumo-ia"></div>'+fontesDistrito(d)+'<div class="tabs">';
  for(var i=0;i<tabs.length;i++){ h+='<button class="tab '+(tabAtiva===tabs[i][0]?"on":"")+'" onclick="setTab(\''+tabs[i][0]+'\')"><span class="ic">'+tabs[i][1]+'</span>'+tabs[i][2]+'</button>'; }
  h+="</div>";
  if(tabAtiva==="clima") h+=tabClima(d);
  else if(tabAtiva==="colheita") h+=tabColheita(d);
  else h+=tabMunicipios(d);
  return h;
}
function setTab(k){ tabAtiva=k; render(); }

function precoDistrito(d){
  var p=d.preco;
  if(!p||p.valor==null) return "";
  var v=Number(p.valor).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
  var stale="";
  if(p.data){ var t=Date.parse(p.data); if(!isNaN(t)&&(Date.now()-t)>30*86400000){ stale='<span class="preco-stale">defasado</span>'; } }
  return '<div class="preco-box"><span class="preco-lab">Pre&ccedil;o da saca</span>'
    +'<span class="preco-v">R$ '+v+'</span><span class="preco-u">/sc 60kg</span>'+stale
    +'<span class="preco-meta">'+escX(p.uf||"")+(p.data?(" &middot; "+fmtDia(p.data)):"")+(p.fonte?(" &middot; "+escX(p.fonte)):"")+'</span></div>';
}
function fontesDistrito(d){
  var ufs=((d.distrito.ufs&&d.distrito.ufs.length)?d.distrito.ufs:[d.distrito.uf]).filter(Boolean).join(", ");
  var c=d.colheita||{}, temColh=(c.status&&c.status!=="pendente"&&c.itens&&c.itens.length);
  var colFonte = temColh ? (escX(c.fonte||"")+(c.granularidade?(" &middot; "+escX(c.granularidade)):"")) : "pendente (Fase 2)";
  var dataGer = d.gerado_em?fmtData(d.gerado_em):"-";
  var colData = temColh && c.data_referencia ? fmtDia(c.data_referencia) : dataGer;
  function linha(lab,fonte,escopo,data){
    return '<div class="fonte-row"><span class="fl">'+lab+'</span><span class="ff">'+fonte+'</span><span class="fe">'+escopo+'</span><span class="fd">'+data+'</span></div>';
  }
  var h='<div class="fontes"><div class="ftitle">'+icoMapa(13,"currentColor")+' Fontes deste distrito</div>';
  h+=linha("Clima","Open-Meteo","previs&atilde;o por munic&iacute;pio",dataGer);
  h+=linha("Alertas","INMET","UF: "+escX(ufs||"-"),dataGer);
  h+=linha("Colheita",colFonte,"",colData);
  return h+"</div>";
}

function tabClima(d){
  var a=agrega(d), al=(d.alertas&&d.alertas.ativos)||[];
  var ufs=(d.distrito.ufs&&d.distrito.ufs.join(", "))||d.distrito.uf||"a UF";
  var h='<div class="kpis">';
  h+=kpi("tmax",icoTermo(18,"currentColor"),"Temp. m&aacute;xima hoje",a.tmaxMax+"&deg;","maior entre os munic&iacute;pios");
  h+=kpi("tmin",icoTermo(18,"currentColor"),"Temp. m&iacute;nima hoje",a.tminMin+"&deg;","menor entre os munic&iacute;pios");
  h+=kpi("sky",icoGota(18),"Chuva pr&oacute;x. 7 dias",a.chuva7+" mm","m&eacute;dia do distrito");
  h+=kpi("brand",icoMapa(18,"#46b27a"),"Munic&iacute;pios",a.n,"com dados de clima");
  h+="</div>";
  if(al.length){
    for(var i=0;i<al.length&&i<6;i++){ var x=al[i];
      h+='<div class="alert"><div class="ico">'+icoAviso(20)+'</div><div><span class="t">'+escX(x.evento||x.tipo||"Aviso")+'</span>'+(x.severidade?" - "+escX(x.severidade):"")+(x.uf?" ("+escX(x.uf)+")":"")+'<div class="d">'+[x.inicio,x.fim].filter(Boolean).join(" ate ")+'</div></div></div>';
    }
  } else {
    h+='<div class="alert empty"><div class="ico">'+icoCheck(20)+'</div><div><span class="t">Sem alertas ativos</span><div class="d">Nenhum aviso do INMET vigente para '+escX(ufs)+' neste momento.</div></div></div>';
  }
  h+=filtroMunicipios(d);
  h+='<div class="grid2">';
  h+='<div class="panel"><div class="stitle">'+icoTermo(14,"currentColor")+' Temperatura por munic&iacute;pio - hoje</div><div class="chart-scroll"><div id="chTemp"></div></div></div>';
  h+='<div class="panel"><div class="stitle">'+icoGota(14,"currentColor")+' Chuva acumulada 7 dias - por munic&iacute;pio</div><div class="chart-scroll"><div id="chChuva"></div></div></div>';
  h+="</div>";
  var selc=selDoDistrito(d), allm=d.municipios||[], temClima=false;
  for(var t=0;t<allm.length;t++){ if(allm[t].clima){ temClima=true; break; } }
  h+='<div class="panel"><div class="stitle">'+icoMapa(14,"currentColor")+' Previs&atilde;o detalhada por munic&iacute;pio</div>';
  if(!temClima){
    for(var m=0;m<allm.length;m++) h+=muncard(allm[m]);
  } else {
    var algum=false;
    for(var m=0;m<allm.length;m++){ if(selc[allm[m].id]){ h+=muncard(allm[m]); algum=true; } }
    if(!algum) h+='<div style="color:var(--dim);font-family:IBM Plex Mono,monospace;font-size:12px;padding:24px 0;text-align:center">Selecione ao menos um munic&iacute;pio no filtro acima.</div>';
  }
  h+="</div>";
  return h;
}
function tabMunicipios(d){ var h=""; for(var i=0;i<(d.municipios||[]).length;i++) h+=muncard(d.municipios[i]); return h; }
function tabColheita(d){
  var c=d.colheita||{status:"pendente"};
  if(c.status==="pendente"||!(c.itens&&c.itens.length)){
    return '<div class="soon"><div class="tag">Fase 2 - em breve</div>'
      +'<div style="font-family:Fraunces,serif;font-size:21px;color:var(--mut);margin-bottom:8px">Timing e posi&ccedil;&atilde;o de plantio e colheita</div>'
      +'<p style="max-width:560px;margin:0 auto;font-size:13px;line-height:1.6">Esta aba mostrar&aacute; % plantado e % colhido por regi&atilde;o (Emater-RS, Deral-PR, Epagri-SC) e por UF (Conab), '
      +'com a posi&ccedil;&atilde;o vs. m&eacute;dia e vs. safra anterior - cada n&uacute;mero com sua fonte e data.</p></div>';
  }
  function pos(v){ if(v==null) return '<span class="cmut">-</span>'; var s=v>0?"+":""; var cls=v>0?"cpos":(v<0?"cneg":"cmut"); return '<span class="'+cls+'">'+s+v+" p.p.</span>"; }

  var h='<div class="panel colh-uf"><div class="stitle">'+icoBroto(14,"currentColor")+' Colheita &amp; plantio - posi&ccedil;&atilde;o</div>';
  h+='<div class="fonte-banner">Fonte: '+escX(c.fonte||"-")+(c.granularidade?(" &middot; "+escX(c.granularidade)):"")+(c.data_referencia?(" &middot; ref. "+fmtDia(c.data_referencia)):"")+'</div>';
  h+='<div class="colh-head"><span>Regi&atilde;o</span><span>Plantado</span><span>Colhido</span><span>vs m&eacute;dia 5a</span><span>vs safra ant.</span></div>';
  for(var i=0;i<c.itens.length;i++){ var it=c.itens[i];
    h+='<div class="colh-row"><span class="cr-nome">'+escX(it.regiao||it.uf||it.municipio||"-")+(it.granularidade?'<span class="cr-gran">'+escX(it.granularidade)+'</span>':'')+'</span>'
      +'<span>'+(it.pct_plantado!=null?it.pct_plantado+"%":"-")+'</span>'
      +'<span class="cr-colh">'+(it.pct_colhido!=null?it.pct_colhido+"%":"-")+'</span>'
      +'<span>'+pos(it.vs_media5anos)+'</span><span>'+pos(it.vs_safra_anterior)+'</span></div>';
    if(it.condicao_lavoura||it.fonte||it.produtividade_kg_ha){ var prodm=it.produtividade_kg_ha?("Produtividade: "+Math.round(it.produtividade_kg_ha/60)+" sc/ha ("+fmtMil(it.produtividade_kg_ha)+" kg/ha) &middot; "):""; h+='<div class="cr-meta">'+prodm+(it.condicao_lavoura?("Lavoura: "+cond(it.condicao_lavoura)+" &middot; "):"")+(it.fonte?("Fonte: "+escX(it.fonte)):"")+(it.data_referencia?(" &middot; "+fmtDia(it.data_referencia)):"")+'</div>'; }
  }
  h+="</div>";
  h+=colheitaMunicipios(d);
  return h;
}
function colheitaMunicipios(d){
  var ms=(d.municipios||[]).filter(function(m){return m.colheita;});
  if(!ms.length) return "";
  var h='<div class="panel colh-mun"><div class="stitle">'+icoBroto(14,"currentColor")+' Colheita estimada por munic&iacute;pio</div>';
  h+='<div class="fonte-banner">Estimativa derivada: &aacute;rea plantada (PAM/IBGE 2024) &times; % estadual. Valores marcados como <b>derivado</b>.</div>';
  h+='<div class="colh-head"><span>Munic&iacute;pio</span><span>&Aacute;rea (ha)</span><span>Plantado</span><span>Colhido</span><span>Colhido (ha est.)</span></div>';
  for(var i=0;i<ms.length;i++){ var m=ms[i], mc=m.colheita;
    h+='<div class="colh-row"><span class="cr-nome">'+escX(m.nome)+'</span>'
      +'<span>'+fmtMil(mc.area_soja_ha)+'</span>'
      +'<span>'+(mc.pct_plantado!=null?mc.pct_plantado+"%":"-")+'</span>'
      +'<span class="cr-colh">'+(mc.pct_colhido!=null?mc.pct_colhido+"%":"-")+'</span>'
      +'<span>'+fmtMil(mc.ha_colhido_estim)+'</span></div>';
  }
  return h+"</div>";
}
function kpi(cls,ico,lab,val,sub){ return '<div class="kpi '+cls+'"><div class="kicker"><span class="ic">'+ico+'</span><span class="lab">'+lab+'</span></div><div class="val">'+val+'</div><div class="sub">'+sub+'</div></div>'; }

// ===== CARD RICO DE MUNICIPIO =====
function muncard(m){
  if(!m.clima){
    return '<div class="muncard semdado"><div class="muncard-head"><div class="muncard-id"><div class="nm">'+escX(m.nome)+'</div>'
      +'<div class="co">'+((m.lat||0).toFixed(3))+' S - '+(Math.abs(m.lon||0).toFixed(3))+' W</div></div>'
      +'<div class="mono" style="font-size:11px;color:var(--dim)">sem dados de clima ainda</div></div></div>';
  }
  var a=climaAtual(m), f=semana(m), obs=m.clima._obsoleto;
  var h='<div class="muncard'+(obs?" semdado":"")+'"><div class="muncard-head">'
    +'<div class="muncard-id"><div class="nm">'+escX(m.nome)+(obs?'<span class="badge-old">dado anterior</span>':'')+'</div>'
    +'<div class="co">'+((m.lat||0).toFixed(3))+' S - '+(Math.abs(m.lon||0).toFixed(3))+' W</div></div>'
    +'<div class="muncard-now"><div style="width:46px;height:46px">'+iconePorTempo(a.tempo,46)+'</div>'
    +'<div class="muncard-temp"><div class="big">'+rnd(a.tmax)+'&deg;</div>'
    +'<div class="mm"><div class="mx">max '+rnd(a.tmax)+'&deg;</div><div class="mn">min '+rnd(a.tmin)+'&deg;</div></div></div></div></div>';
  h+='<div class="muncard-body">';
  h+=metric("sky",(a.precip_mm==null?0:a.precip_mm)+" mm","chuva hoje");
  h+=metric("cyan",(a.prob_chuva==null?0:a.prob_chuva)+"%","prob. chuva");
  h+=metric("brand",escX(rotuloTempo(a.tempo)),"condi&ccedil;&atilde;o");
  h+="</div>";
  h+='<div class="week">';
  for(var k=0;k<f.length&&k<7;k++){ var dia=f[k], today=dia.data===hoje();
    h+='<div class="wday'+(today?" today":"")+'"><div class="wd">'+diaSemana(dia.data)+" "+ddmm(dia.data)+'</div>'
      +'<div class="wi">'+iconePorTempo(dia.tempo,34)+'</div>'
      +'<div class="wmax">'+rnd(dia.tmax)+'&deg;</div><div class="wmin">'+rnd(dia.tmin)+'&deg;</div>'
      +'<div class="wr">'+((dia.precip_mm||0)>0?(dia.precip_mm+" mm"):"&mdash;")+'</div></div>';
  }
  h+="</div>";
  if(m.colheita){ var mc=m.colheita;
    h+='<div class="mun-colh"><div class="mc-h">'+icoBroto(12,"currentColor")+' Colheita'+(mc.derivado?'<span class="mc-deriv">estimado</span>':'')+'</div>';
    h+='<div class="muncard-body">';
    h+=metric("brand",fmtMil(mc.area_soja_ha)+" ha","&aacute;rea de soja");
    h+=metric("sky",(mc.pct_plantado!=null?mc.pct_plantado+"%":"-"),"plantado");
    h+=metric("cyan",(mc.pct_colhido!=null?mc.pct_colhido+"%":"-"),"colhido");
    h+=metric("brand",fmtMil(mc.ha_colhido_estim)+" ha","colhido est.");
    h+='</div>';
    h+='<div class="mc-fonte">'+escX(mc.fonte||"")+(mc.data_referencia?(" &middot; "+fmtDia(mc.data_referencia)):"")+'</div></div>';
  }
  h+="</div>";
  return h;
}
function fmtMil(n){ return (n==null||n==="")?"-":Number(n).toLocaleString("pt-BR"); }
function fmtDia(s){ var m=String(s||"").match(/^(\d{4})-(\d{2})-(\d{2})/); return m?(m[3]+"/"+m[2]+"/"+m[1]):escX(String(s||"")); }
function metric(cls,val,lab){ return '<div class="metric"><div class="mv '+cls+'">'+val+'</div><div class="ml">'+lab+'</div></div>'; }

// ===== GRAFICOS SVG =====
function corVar(nome){ var s=getComputedStyle(document.documentElement).getPropertyValue(nome); return (s||"").trim()||"#888"; }
function graficoBarras(nomes,grupos,opts){
  opts=opts||{};
  var n=nomes.length, ng=grupos.length, H=250;
  var mostraRot = n>0 && n <= (opts.maxRotulos||14);
  var padL=34,padR=12,padT=opts.legenda?30:14,padB=mostraRot?42:16;
  var plotW=Math.max(n*(mostraRot?46:12),470), W=padL+padR+plotW, plotH=H-padT-padB, maxV=0;
  for(var g=0;g<ng;g++) for(var i=0;i<grupos[g].dados.length;i++) if(grupos[g].dados[i]>maxV) maxV=grupos[g].dados[i];
  if(maxV<=0) maxV=1;
  var step=Math.pow(10,Math.floor(Math.log(maxV)/Math.LN10)),topo=Math.ceil(maxV/step)*step; if(topo<=maxV) topo+=step;
  var slot=plotW/n, bw=Math.min(slot*0.66/ng,24);
  var cgrid=corVar("--grid"),cmut=corVar("--mut"),cdim=corVar("--dim");
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="'+W+'" height="'+H+'" preserveAspectRatio="xMinYMid meet" style="font-family:IBM Plex Mono,monospace">';
  for(var L=0;L<=4;L++){ var val=topo*L/4,y=padT+plotH-(val/topo)*plotH;
    svg+='<line x1="'+padL+'" y1="'+y.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+y.toFixed(1)+'" stroke="'+cgrid+'" stroke-width="1"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(y+3).toFixed(1)+'" fill="'+cdim+'" font-size="9" text-anchor="end">'+Math.round(val)+'</text>';
  }
  for(var x=0;x<n;x++){ var cx=padL+slot*x+slot/2,startX=cx-(bw*ng)/2;
    for(var gi=0;gi<ng;gi++){ var v=grupos[gi].dados[x]||0,bh=(v/topo)*plotH,bx=startX+gi*bw,by=padT+plotH-bh;
      svg+='<rect x="'+bx.toFixed(1)+'" y="'+by.toFixed(1)+'" width="'+Math.max(1,bw-2).toFixed(1)+'" height="'+Math.max(0,bh).toFixed(1)+'" fill="'+grupos[gi].cor+'" rx="1.5"/>';
      if(mostraRot) svg+='<text x="'+(bx+(bw-2)/2).toFixed(1)+'" y="'+(by-3).toFixed(1)+'" fill="'+grupos[gi].cor+'" font-size="8.5" text-anchor="middle">'+Math.round(v)+'</text>';
    }
    var tip=(opts.tips&&opts.tips[x])||nomes[x];
    svg+='<rect x="'+(padL+slot*x).toFixed(1)+'" y="'+padT+'" width="'+slot.toFixed(1)+'" height="'+plotH+'" fill="transparent" style="cursor:pointer"><title>'+escX(tip)+'</title></rect>';
    if(mostraRot){ var nm=nomes[x]; if(nm.length>9) nm=nm.slice(0,8)+".";
      svg+='<text x="'+cx.toFixed(1)+'" y="'+(H-padB+15)+'" fill="'+cmut+'" font-size="9" text-anchor="middle">'+escX(nm)+'</text>'; }
  }
  if(opts.legenda&&ng>1){ var lx=padL,ly=14;
    for(var le=0;le<ng;le++){ svg+='<rect x="'+lx+'" y="'+(ly-8)+'" width="10" height="10" fill="'+grupos[le].cor+'" rx="2"/><text x="'+(lx+14)+'" y="'+ly+'" fill="'+cmut+'" font-size="10">'+escX(grupos[le].nome)+'</text>'; lx+=14+grupos[le].nome.length*6.5+18; }
  }
  return svg+"</svg>";
}
function desenhaGraficos(d){
  var sel=selDoDistrito(d), all=d.municipios||[], ms=[];
  for(var i=0;i<all.length;i++){ if(all[i].clima && sel[all[i].id]) ms.push(all[i]); }
  var cT=$("chTemp"),cC=$("chChuva");
  if(!ms.length){ var msg='<div style="color:var(--dim);font-family:IBM Plex Mono,monospace;font-size:12px;padding:30px 0;text-align:center">Selecione ao menos um munic&iacute;pio para comparar.</div>'; if(cT)cT.innerHTML=msg; if(cC)cC.innerHTML=msg; return; }
  var nomes=[],tmax=[],tmin=[],chuva=[],tipsT=[],tipsC=[];
  for(var j=0;j<ms.length;j++){ var a=climaAtual(ms[j]),s=Number(somaChuva7(ms[j]).toFixed(1)),nm=String(ms[j].nome);
    nomes.push(nm.replace("Sant'Ana do Livramento","Livramento")); tmax.push(rnd(a.tmax)); tmin.push(rnd(a.tmin)); chuva.push(s);
    tipsT.push(nm+" - max "+rnd(a.tmax)+"\u00b0 / min "+rnd(a.tmin)+"\u00b0");
    tipsC.push(nm+" - "+s+" mm em 7 dias");
  }
  if(cT) cT.innerHTML=graficoBarras(nomes,[{nome:"Max",cor:corVar("--chartMax"),dados:tmax},{nome:"Min",cor:corVar("--chartMin"),dados:tmin}],{legenda:true,tips:tipsT});
  if(cC) cC.innerHTML=graficoBarras(nomes,[{nome:"Chuva 7d (mm)",cor:corVar("--sky"),dados:chuva}],{legenda:true,tips:tipsC});
}

// ===== FILTRO DE MUNICIPIOS =====
function imprimirBoletim(){
  var d=cacheDistrito[nav.distrito]; if(!d) return;
  var sel=selDoDistrito(d), r=cacheResumo[nav.distrito];
  var hoje=new Date().toLocaleDateString("pt-BR");
  var h='<div class="pr-head"><div class="pr-eyebrow">Boletim de Clima &amp; Colheita</div>'
    +'<div class="pr-title">'+escX(d.distrito.nome||"")+'</div>'
    +'<div class="pr-sub">'+escX(d.distrito.regional||"")+' &middot; UF: '+escX((d.distrito.ufs||[]).join(", "))+' &middot; emitido em '+hoje+'</div></div>';
  if(r&&r.texto){
    h+='<div class="pr-sec">Resumo do analista (gerado por IA)</div><p class="pr-txt">'+escX(r.texto)+'</p>';
    for(var i=0;i<(r.pontos||[]).length;i++){ h+='<div class="pr-pt">&bull; '+escX(r.pontos[i])+'</div>'; }
    h+='<div class="pr-meta">'+escX(r.modelo||"")+' &middot; '+fmtData(r.gerado_em||"")+'</div>';
  }
  var p=d.preco;
  if(p&&p.valor!=null){
    h+='<div class="pr-sec">Pre&ccedil;o da saca</div><p class="pr-txt">R$ '+Number(p.valor).toLocaleString("pt-BR",{minimumFractionDigits:2})+' /sc 60kg ('+escX(p.uf||"")+') &middot; '+fmtDia(p.data||"")+' &middot; '+escX(p.fonte||"")+'</p>';
  }
  var c=d.colheita;
  if(c&&c.itens&&c.itens.length){
    h+='<div class="pr-sec">Colheita &amp; plantio</div><table class="pr-tab"><tr><th>Regi&atilde;o</th><th>Plantado</th><th>Colhido</th><th>Produtividade</th><th>Fonte</th></tr>';
    for(var j=0;j<c.itens.length;j++){ var it=c.itens[j];
      h+='<tr><td>'+escX(it.regiao||it.uf||"")+'</td><td>'+(it.pct_plantado!=null?it.pct_plantado+"%":"-")+'</td><td>'+(it.pct_colhido!=null?it.pct_colhido+"%":"-")+'</td>'
        +'<td>'+(it.produtividade_kg_ha?(Math.round(it.produtividade_kg_ha/60)+" sc/ha"):"-")+'</td>'
        +'<td>'+escX(it.fonte||"")+(it.data_referencia?(" ("+fmtDia(it.data_referencia)+")"):"")+'</td></tr>';
    }
    h+='</table>';
  }
  var ms=(d.municipios||[]).filter(function(m){ return m.clima && sel[m.id]; });
  h+='<div class="pr-sec">Previs&atilde;o 7 dias - munic&iacute;pios selecionados ('+ms.length+')</div>';
  for(var k=0;k<ms.length;k++){ var m=ms[k], prev=(m.clima.previsao_7d||[]).slice(0,7);
    h+='<div class="pr-mun"><div class="pr-mun-h">'+escX(m.nome)+(m.area_soja_ha?(' <span style="font-weight:400;color:#666;font-size:10px">('+fmtMil(m.area_soja_ha)+' ha de soja)</span>'):'')+'</div>';
    if(m.colheita){ var mc=m.colheita;
      h+='<div class="pr-mun-c">Colheita: '+(mc.pct_plantado!=null?("plantado "+mc.pct_plantado+"%"):"")+(mc.pct_colhido!=null?(" &middot; colhido "+mc.pct_colhido+"%"):"")+(mc.regiao?(" &middot; regi&atilde;o "+escX(mc.regiao)):"")+' <span style="color:#888">(estimativa derivada)</span></div>';
    }
    h+='<table class="pr-tab"><tr><th>Dia</th><th>Tempo</th><th>Max</th><th>Min</th><th>Chuva</th><th>Prob.</th><th>Rajada</th></tr>';
    for(var q=0;q<prev.length;q++){ var dd=prev[q];
      h+='<tr><td>'+fmtDia(dd.data||"").slice(0,5)+'</td><td>'+escX(dd.tempo||"-")+'</td><td>'+(dd.tmax!=null?Math.round(dd.tmax)+"\u00b0":"-")+'</td><td>'+(dd.tmin!=null?Math.round(dd.tmin)+"\u00b0":"-")+'</td>'
        +'<td>'+(dd.precip_mm!=null?dd.precip_mm+" mm":"-")+'</td><td>'+(dd.prob_chuva!=null?dd.prob_chuva+"%":"-")+'</td><td>'+(dd.rajada_kmh!=null?Math.round(dd.rajada_kmh)+" km/h":"-")+'</td></tr>';
    }
    h+='</table></div>';
  }
  h+='<div class="pr-foot">Gerado em '+hoje+' &middot; boletim-agro.vercel.app &middot; Dados: Open-Meteo (previs&atilde;o), INMET (alertas), Conab e &oacute;rg&atilde;os estaduais (colheita), fontes de pre&ccedil;o citadas &middot; Estimativas municipais s&atilde;o derivadas e rotuladas.</div>';
  var pa=document.getElementById("print-area");
  if(!pa){ pa=document.createElement("div"); pa.id="print-area"; document.body.appendChild(pa); }
  pa.innerHTML=h;
  window.print();
}
var muniSel={};
function selDoDistrito(d){
  var id=d.distrito.id;
  if(!muniSel[id]){ muniSel[id]={}; var ms=d.municipios||[]; for(var i=0;i<ms.length;i++){ if(ms[i].clima) muniSel[id][ms[i].id]=true; } }
  return muniSel[id];
}
function toggleMuni(mid){ var s=muniSel[nav.distrito]; if(!s) return; s[mid]=!s[mid]; render(); }
function todosMuni(v){ var s=muniSel[nav.distrito]; if(!s) return; for(var k in s){ s[k]=v; } render(); }
function filtroMunicipios(d){
  var all=(d.municipios||[]).filter(function(m){ return m.clima; });
  if(all.length<=1) return "";
  var sel=selDoDistrito(d), nsel=0; for(var k in sel){ if(sel[k]) nsel++; }
  var h='<div class="panel filtro"><div class="filtro-top"><div class="stitle" style="margin:0">'+icoMapa(14,"currentColor")+' Comparar munic&iacute;pios</div>'
    +'<div class="filtro-acts"><span class="fcount">'+nsel+' de '+all.length+'</span>'
    +'<button class="fbtn" onclick="todosMuni(true)">Todos</button><button class="fbtn" onclick="todosMuni(false)">Limpar</button></div></div>';
  h+='<div class="chips">';
  for(var i=0;i<all.length;i++){ var m=all[i]; h+='<button class="chip'+(sel[m.id]?" on":"")+'" onclick="toggleMuni(\''+m.id+'\')">'+escX(m.nome)+'</button>'; }
  return h+'</div></div>';
}

// ===== ROTEADOR =====
function render(){
  renderSidebar();
  var v=$("view");
  if(!nav.distrito){ v.innerHTML=viewMapa(); return; }
  if(cacheDistrito[nav.distrito]){
    v.innerHTML=montaDistrito(cacheDistrito[nav.distrito]);
    carregaResumoIA(nav.distrito);
    if(tabAtiva==="clima") setTimeout(function(){ desenhaGraficos(cacheDistrito[nav.distrito]); },30);
    return;
  }
  v.innerHTML='<div class="loading">Carregando distrito...</div>';
  viewDistrito().then(function(html){ v.innerHTML=html;
    carregaResumoIA(nav.distrito);
    if(tabAtiva==="clima"&&cacheDistrito[nav.distrito]) setTimeout(function(){ desenhaGraficos(cacheDistrito[nav.distrito]); },40);
  });
}

carregaJSON(BASE+"/index.json?t="+Date.now()).then(function(idx){

});
