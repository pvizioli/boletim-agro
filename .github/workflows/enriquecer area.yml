name: Enriquecer area de soja (PAM/IBGE)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Preencher area_soja_ha a partir da PAM/IBGE
        run: python pipeline/enriquecer_area_soja.py config/municipios.csv
      - name: Commit do CSV enriquecido
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/municipios.csv
          if git diff --staged --quiet; then
            echo "Nada mudou (CSV ja estava preenchido)"
          else
            git commit -m "Preenche area_soja_ha (PAM/IBGE) em municipios.csv"
            git push
          fi
