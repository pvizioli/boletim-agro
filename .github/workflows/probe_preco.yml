name: Probe preco CEPEA (soja)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Testar acesso ao CEPEA e estrutura do valor
        run: python pipeline/conectores/preco_cepea.py --probe
