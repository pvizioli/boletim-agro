name: Testar extracao colheita (Emater-RS)

on:
  workflow_dispatch:
    inputs:
      pdf:
        description: "caminho de um PDF no repo (vazio = descobrir o mais recente)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  testar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extrair dados de colheita do boletim
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARG="${{ github.event.inputs.pdf }}"
          if [ -z "$ARG" ]; then ARG="--auto"; fi
          python pipeline/conectores/colheita_emater_rs.py "$ARG"
