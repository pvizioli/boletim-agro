name: Atualizar dados

on:
  workflow_dispatch:
    inputs:
      alvo:
        description: "vazio=slot da hora (seguro) | distrito_id | k/n | 'todos' (só com API key)"
        required: false
        default: ""
  schedule:
    - cron: "0 * * * *"        # de hora em hora; cada hora processa um slot

permissions:
  contents: write

concurrency:
  group: atualizar-dados
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r pipeline/requirements.txt

      - name: Definir alvo
        id: alvo
        run: |
          INPUT="${{ github.event.inputs.alvo }}"
          if [ "${{ github.event_name }}" = "schedule" ] || [ -z "$INPUT" ]; then
            echo "alvo=$(( $(date -u +%H) % 24 ))/24" >> "$GITHUB_OUTPUT"
          else
            echo "alvo=$INPUT" >> "$GITHUB_OUTPUT"
          fi

      - name: Executar pipeline
        # Plano pago: descomente e cadastre o secret OPEN_METEO_APIKEY
        # env:
        #   OPEN_METEO_APIKEY: ${{ secrets.OPEN_METEO_APIKEY }}
        run: python pipeline/main.py "${{ steps.alvo.outputs.alvo }}"

      - name: Commit dos dados atualizados
        run: |
          git config user.name "boletim-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/data/out
          git diff --cached --quiet || git commit -m "dados: $(date -u +'%Y-%m-%d %H:%M UTC') alvo=${{ steps.alvo.outputs.alvo }}"
          git push
