name: Atualizar dados

on:
  workflow_dispatch: {}        # botão "Run workflow" para disparo manual
  schedule:
    - cron: "0 9,21 * * *"     # 06h e 18h de Brasília (UTC-3)

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r pipeline/requirements.txt

      - name: Executar pipeline
        run: python pipeline/main.py

      - name: Publicar dados junto com o site (web/data/out)
        run: |
          mkdir -p web/data
          rm -rf web/data/out
          cp -r data/out web/data/out

      - name: Commit dos dados atualizados
        run: |
          git config user.name "boletim-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/out web/data/out
          git diff --cached --quiet || git commit -m "dados: atualização automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
